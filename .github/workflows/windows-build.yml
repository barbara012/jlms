name: Build Windows Bundle

on:
  workflow_dispatch:
    inputs:
      mihomo_version:
        description: "mihomo 版本，留空则使用 latest，例如 v1.19.27"
        required: false
        default: ""
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      CARGO_TERM_COLOR: always
      MIHOMO_VERSION_INPUT: ${{ github.event.inputs.mihomo_version }}
      SIDE_CAR_PATH: src-tauri\binaries\mihomo-x86_64-pc-windows-msvc.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Download mihomo sidecar
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'

          $version = $env:MIHOMO_VERSION_INPUT
          if ([string]::IsNullOrWhiteSpace($version)) {
            $apiUrl = 'https://api.github.com/repos/MetaCubeX/mihomo/releases/latest'
          } else {
            if (-not $version.StartsWith('v')) {
              $version = "v$version"
            }
            $apiUrl = "https://api.github.com/repos/MetaCubeX/mihomo/releases/tags/$version"
          }

          $headers = @{
            'Accept' = 'application/vnd.github+json'
            'X-GitHub-Api-Version' = '2022-11-28'
          }
          if ($env:GITHUB_TOKEN) {
            $headers['Authorization'] = "Bearer $env:GITHUB_TOKEN"
          }

          $release = Invoke-RestMethod -Uri $apiUrl -Headers $headers
          $assets = @($release.assets)

          $patterns = @(
            '^mihomo-windows-amd64-v1-.*\.zip$',
            '^mihomo-windows-amd64-compatible-.*\.zip$',
            '^mihomo-windows-amd64-v\d+\.\d+\.\d+.*\.zip$',
            '^mihomo-windows-amd64-v3-.*\.zip$',
            '^mihomo-windows-amd64-v2-.*\.zip$'
          )

          $asset = $null
          foreach ($pattern in $patterns) {
            $asset = $assets | Where-Object { $_.name -match $pattern } | Select-Object -First 1
            if ($asset) { break }
          }

          if (-not $asset) {
            throw "未找到可用的 Windows amd64 mihomo 资产。release=$($release.tag_name)"
          }

          New-Item -ItemType Directory -Force -Path 'src-tauri\binaries' | Out-Null
          $zipPath = Join-Path $env:RUNNER_TEMP $asset.name
          $extractDir = Join-Path $env:RUNNER_TEMP 'mihomo-win'
          if (Test-Path $extractDir) {
            Remove-Item -Recurse -Force $extractDir
          }

          Write-Host "Using mihomo asset: $($asset.name)"
          Invoke-WebRequest -Uri $asset.browser_download_url -Headers $headers -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $extractDir -Force

          $exe = Get-ChildItem -Path $extractDir -Recurse -Filter 'mihomo.exe' | Select-Object -First 1
          if (-not $exe) {
            throw '压缩包中未找到 mihomo.exe'
          }

          Copy-Item $exe.FullName $env:SIDE_CAR_PATH -Force
          "MIHOMO_RELEASE_TAG=$($release.tag_name)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "MIHOMO_ASSET_NAME=$($asset.name)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Windows bundle
        run: npm run tauri build -- --target x86_64-pc-windows-msvc

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: jlms-windows-x64-${{ github.ref_name || github.run_number }}
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.zip
          if-no-files-found: error

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.zip
